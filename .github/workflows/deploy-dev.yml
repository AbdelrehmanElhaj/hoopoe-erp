name: CI/CD — Dev Deploy

on:
  push:
    branches:
      - dev

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/hoopoe-erp-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/hoopoe-erp-frontend

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Job 1: Run backend unit tests
  # ─────────────────────────────────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Maven tests
        working-directory: ./backend
        run: ./mvnw test

  # ─────────────────────────────────────────────────────────────────────
  # Job 2: Build and push Docker images to Docker Hub
  # ─────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to EC2 dev instance
  # ─────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/hoopoe-erp"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PRIVATE_KEY_ENCRYPTION_KEY: ${{ secrets.PRIVATE_KEY_ENCRYPTION_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DB_USER,DB_PASSWORD,JWT_SECRET,PRIVATE_KEY_ENCRYPTION_KEY
          script: |
            set -e
            cd /opt/hoopoe-erp

            # Write .env from injected secrets
            cat > .env <<EOF
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
            DB_URL=jdbc:postgresql://postgres:5432/accounting_db
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            PRIVATE_KEY_ENCRYPTION_KEY=${PRIVATE_KEY_ENCRYPTION_KEY}
            ZATCA_ENV=sandbox
            EOF
            chmod 600 .env

            # Log in to Docker Hub on EC2 (avoids anonymous pull rate limits)
            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

            # Pull latest images and restart containers
            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

            # Clean up dangling images to save disk space
            docker image prune -f
